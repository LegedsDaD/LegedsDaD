name: EasierBot Assistant

on:
  schedule:
    - cron: '*/15 * * * *'
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  run-bot:
    # This calls your reusable workflow
    uses: YOUR_USERNAME/EasierBot/.github/workflows/bot-engine.yml@main
    
    # This tells GitHub to allow the reusable workflow to use secrets defined in YOUR repo
    secrets: inherit
