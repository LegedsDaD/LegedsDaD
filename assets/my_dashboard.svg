        <circle cx="530" cy="245" r="3.5" fill="#ffffff" filter="url(#subtle-glow)" class="anim-cw" />
        <circle cx="270" cy="245" r="2.5" fill="#10ff00" class="anim-ccw" />
    </g>

    <circle cx="400" cy="245" r="72" fill="none" stroke="#008f11" stroke-width="1" stroke-dasharray="6, 5" opacity="0.6" class="anim-ccw" />
    <circle cx="400" cy="245" r="64" fill="none" stroke="#10ff00" stroke-width="1.2" stroke-dasharray="40 20 80 30" class="anim-cw" filter="url(#subtle-glow)"/>
    <circle cx="400" cy="245" r="54" fill="#060913" stroke="#10ff00" stroke-width="2" class="anim-pulse" />

