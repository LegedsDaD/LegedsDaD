        <circle cx="400" cy="245" r="130" fill="none" stroke="#cea47e" stroke-width="3" stroke-dasharray="93 360" transform="rotate(195 400 245)" stroke-linecap="round" opacity="0.85" filter="url(#subtle-glow)" />
