        <line x1="400" y1="245" x2="400" y2="385" class="sync-link-pulse" />
        <line x1="400" y1="245" x2="160" y2="245" class="sync-link-pulse" />
        <line x1="400" y1="245" x2="640" y2="245" class="sync-link-pulse" />
        <line x1="400" y1="245" x2="280" y2="135" class="sync-link-pulse" />
        <line x1="400" y1="245" x2="520" y2="135" class="sync-link-pulse" />
    </g>

    <circle cx="400" cy="245" r="115" fill="none" stroke="#10ff00" stroke-width="0.75" stroke-dasharray="8, 12 40, 15 4, 8" opacity="0.5" class="anim-orbit-slow" />
    <circle cx="400" cy="245" r="105" fill="none" stroke="#008f11" stroke-width="0.75" opacity="0.3" />
    
    <g class="anim-cw">
        <circle cx="400" cy="245" r="85" fill="none" stroke="#10ff00" stroke-width="5" stroke-linecap="round" stroke-dasharray="430 500" filter="url(#hud-glow)" id="reactorArcPrimary" />
        <circle cx="400" cy="245" r="85" fill="none" stroke="#008f11" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="100 500" stroke-dashoffset="300" />
        <circle cx="400" cy="245" r="85" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
    </g>

    <g class="language-arc-group">
